<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Using Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-robot"></i> AI Resume Analyzer</h1>
            <p>Optimize your resume for Applicant Tracking Systems using  AI</p>
        </header>

        <main>
            <section class="input-section">
                <form id="analyzeForm">
                    <div class="form-group">
                        <label for="resume">Upload Resume (PDF, DOCX)</label>
                        <div class="file-upload">
                            <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
                            <div class="file-upload-overlay">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span>Choose a file or drag it here</span>
                                <small id="fileName">No file chosen</small>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="job_description">Job Description</label>
                        <textarea id="job_description" name="job_description" rows="6" placeholder="Paste the target job description here..." required></textarea>
                    </div>

                    <button type="submit" id="submitBtn">
                        <span>Analyze Resume</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </form>
            </section>

            <!-- Loading State -->
            <div id="loadingState" class="hidden">
                <div class="spinner"></div>
                <p>AI is analyzing your resume...</p>
            </div>

            <!-- Results Section -->
            <section id="resultsSection" class="hidden">
                <div class="results-header">
                    <h2>Analysis Results</h2>
                    <span id="jobCategory" class="badge-primary">Software Engineer</span>
                </div>

                <div class="dashboard">
                    <!-- Gauge Card -->
                    <div class="card score-card">
                        <h3>ATS Match Score</h3>
                        <div class="gauge-container">
                            <svg class="circular-chart" viewBox="0 0 36 36">
                                <path class="circle-bg"
                                    d="M18 2.0845
                                      a 15.9155 15.9155 0 0 1 0 31.831
                                      a 15.9155 15.9155 0 0 1 0 -31.831"
                                />
                                <path class="circle" id="scoreCircle"
                                    stroke-dasharray="0, 100"
                                    d="M18 2.0845
                                      a 15.9155 15.9155 0 0 1 0 31.831
                                      a 15.9155 15.9155 0 0 1 0 -31.831"
                                />
                                <text x="18" y="20.35" class="percentage" id="scoreText">0%</text>
                            </svg>
                        </div>
                        <p id="scoreMessage" class="score-message">Needs Improvement</p>
                    </div>

                    <!-- Keywords Cards -->
                    <div class="keywords-container">
                        <div class="card match-card">
                            <h3><i class="fa-solid fa-check-circle text-success"></i> Matched Keywords</h3>
                            <div id="matchedKeywords" class="tags-container">
                                <!-- Tags will be injected here -->
                            </div>
                        </div>
                        
                        <div class="card missing-card">
                            <h3><i class="fa-solid fa-times-circle text-danger"></i> Missing Keywords</h3>
                            <div id="missingKeywords" class="tags-container">
                                <!-- Tags will be injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Suggestions Card -->
                    <div class="card suggestions-card full-width">
                        <h3><i class="fa-solid fa-lightbulb text-warning"></i> Improvement Suggestions</h3>
                        <ul id="suggestionsList" class="suggestions-list">
                            <!-- Suggestions will be injected here -->
                        </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
